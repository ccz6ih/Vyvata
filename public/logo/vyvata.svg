<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="main-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="50" cy="50" r="45" fill="url(#bg-gradient)" />
  
  <!-- Flow lines (representing vata - vital force/circulation) -->
  <path d="M 30 35 Q 40 25, 50 30 T 70 35" stroke="url(#flow-gradient)" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M 28 45 Q 38 35, 50 42 T 72 48" stroke="url(#flow-gradient)" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 26 55 Q 36 45, 50 54 T 74 61" stroke="url(#flow-gradient)" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Main V shape (bold, geometric) -->
  <path d="M 35 30 L 50 65 L 65 30" stroke="url(#main-gradient)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Verification checkmark integrated into the V -->
  <path d="M 46 52 L 50 58 L 58 42" stroke="#14B8A6" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  
  <!-- Subtle dots representing precision/data points -->
  <circle cx="35" cy="30" r="2.5" fill="#14B8A6" opacity="0.8"/>
  <circle cx="65" cy="30" r="2.5" fill="#14B8A6" opacity="0.8"/>
  <circle cx="50" cy="65" r="2.5" fill="#14B8A6" opacity="0.8"/>
</svg>
